apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  sources:
    - repoURL: https://grafana.github.io/helm-charts
      chart: grafana
      targetRevision: 10.5.5
      helm:
        releaseName: grafana
        valueFiles:
          - $values/observability/grafana/values.yaml
    - repoURL: git@github.com:nguyenductien-qnm/argocd-observability-lab.git
      targetRevision: main
      ref: values
