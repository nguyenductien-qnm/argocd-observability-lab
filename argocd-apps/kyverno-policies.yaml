apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno-policy
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: git@github.com:nguyenductien-qnm/argocd-observability-lab.git
    targetRevision: main
    path: kyverno
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
