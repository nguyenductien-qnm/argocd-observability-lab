apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - SkipSchemaValidation=true
  sources:
    - repoURL: https://kyverno.github.io/kyverno
      chart: kyverno
      targetRevision: 3.8.1
      helm:
        parameters:
          - name: admissionController.replicas
            value: "1"
          - name: crds.install
            value: "true"
    - repoURL: git@github.com:nguyenductien-qnm/argocd-observability-lab.git
      targetRevision: main
      path: kyverno
