apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  sources:
    - repoURL: https://grafana.github.io/helm-charts
      chart: loki
      targetRevision: 7.0.0
      helm:
        releaseName: loki
        valueFiles:
          - $values/observability/loki/values.yaml
    - repoURL: git@github.com:nguyenductien-qnm/argocd-observability-lab.git
      targetRevision: main
      ref: values
