apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: api-external-secret
  namespace: api
spec:
  refreshInterval: "30s"
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: api-secret
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_PASSWORD
      remoteRef:
        key: w10
        property: DATABASE_PASSWORD
