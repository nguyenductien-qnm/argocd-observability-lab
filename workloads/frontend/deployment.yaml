apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: frontend
  labels:
    app: frontend
spec:
  replicas: 5
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      imagePullSecrets:
        - name: ecr-registry
      containers:
        - name: frontend
          image: 730335441285.dkr.ecr.ap-southeast-1.amazonaws.com/web-w9:sha-3de1d6a4883e3b2f7b6338cfd6faf06643676cdb
          ports:
            - containerPort: 80
