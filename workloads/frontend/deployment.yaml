apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: frontend
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      imagePullSecrets:
        - name: ecr-registry
      containers:
        - name: frontend
          image: 730335441285.dkr.ecr.ap-southeast-1.amazonaws.com/w9-image:sha-7ba37782d7d60253b5e08e9a7d78278a218a14b5
          ports:
            - containerPort: 80
